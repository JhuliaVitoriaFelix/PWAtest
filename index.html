<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itaipu Parquetec - PWA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <header class="header">
            <img src="Images/LogoItaipu.png" alt="Logo Itaipu Parquetec" class="logo">
        </header>

        <p class="welcome-text">Selecione uma opção:</p>

        <nav class="button-group">
            <button class="btn" onclick="navegar('mapa')">
                <span class="icon">📍</span> Visualizar Mapa
            </button>
            
            <button class="btn" onclick="navegar('estatisticas')">
                <span class="icon">📊</span> Ver Estatísticas
            </button>
            
            <button class="btn" onclick="navegar('tutorial')">
                <span class="icon">📖</span> Como Usar o App
            </button>
        </nav>
    </div>

    <script>
        // Mantendo seu registro de Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function navegar(destino) {
            console.log("Indo para: " + destino);
            alert("Navegando para: " + destino);
        }
    </script>
</body>
</html>
